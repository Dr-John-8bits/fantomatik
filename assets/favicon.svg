    <rect x="17" y="7" width="6" height="5"/>
    <rect x="28" y="7" width="6" height="5"/>
    <rect x="39" y="7" width="6" height="5"/>
    <rect x="50" y="7" width="6" height="5"/>
    <rect x="6"  y="52" width="6" height="5"/>
    <rect x="17" y="52" width="6" height="5"/>
    <rect x="28" y="52" width="6" height="5"/>
    <rect x="39" y="52" width="6" height="5"/>
    <rect x="50" y="52" width="6" height="5"/>
  </g>
  <!-- point en surimpression -->
  <circle cx="30" cy="34" r="13" fill="#ECF312"/>
  <circle cx="34" cy="31" r="13" fill="#FF2D8E"/>
