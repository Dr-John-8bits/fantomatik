<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="fantomatik">
  <!-- favicon spectral : un point de phosphore avec lueur, posé sur un fragment
       de forme d'onde. aucune imagerie hacker, juste le signal. -->
  <defs>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4DFFB0" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#4DFFB0" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4DFFB0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="12" fill="#0A0B0D"/>

  <!-- fragment de waveform, discret -->
  <path d="M8 32 q 8 -13 16 0 t 16 0 t 16 0"
        fill="none" stroke="#4DFFB0" stroke-opacity="0.45"
        stroke-width="2" stroke-linecap="round"/>

  <!-- halo de rémanence -->
  <circle cx="32" cy="32" r="20" fill="url(#halo)"/>
  <!-- coeur du point -->
  <circle cx="32" cy="32" r="5.5" fill="#4DFFB0"/>
  <circle cx="32" cy="32" r="2.4" fill="#EAFFF5"/>
</svg>
